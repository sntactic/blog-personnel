<div class="card h-100 article-card">
  @if (article().images.length > 0) {
    <img [src]="article().images[0]" class="card-img-top" [alt]="article().title" />
  } @else {
    <div class="card-img-top placeholder-img d-flex align-items-center justify-content-center">
      <span class="text-muted small">Aucune image</span>
    </div>
  }

  <div class="card-body d-flex flex-column">
    <h2 class="h5 card-title">{{ article().title }}</h2>
    <p class="text-muted small mb-2">
      Par {{ article().authorName }} · {{ article().createdAt | date: 'dd MMM y' }}
    </p>
    <p class="card-text text-truncate-3">{{ article().content }}</p>

    <div class="mt-auto">
      <div class="mb-2">
        @for (tag of article().tags; track tag) {
          <span class="badge tag-badge me-1">{{ tag }}</span>
        }
      </div>
      <a [routerLink]="['/articles', article().id]" class="btn btn-outline-primary btn-sm">
        Lire l'article
      </a>
    </div>
  </div>
</div>
