services:

  mongodb:
    image: mongo:7
    container_name: blog-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: blogdb
    volumes:
      - mongodb_data:/data/db
    networks:
      - blog-network

  minio:
    image: minio/minio:latest
    container_name: blog-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web d'administration
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: motdepasse123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - blog-network

  # Optionnel : crée automatiquement le bucket au démarrage
  createbuckets:
    image: minio/mc:latest
    container_name: blog-minio-init
    depends_on:
      - minio
    networks:
      - blog-network
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set localminio http://minio:9000 admin motdepasse123;
      mc mb localminio/blog-images --ignore-existing;
      mc anonymous set download localminio/blog-images;
      exit 0;
      "

volumes:
  mongodb_data:
  minio_data:

networks:
  blog-network:
    driver: bridge